<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChipFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="toolbar">
    <span class="logo">⬡ ChipFlow</span>
    <div id="chip-palette"></div>
    <div class="toolbar-right">
      <span class="hint">Scroll: zoom &nbsp;|&nbsp; Drag canvas: pan &nbsp;|&nbsp; Right-click chip: delete &nbsp;|&nbsp; Click wire: delete</span>
      <div class="toolbar-file">
        <button id="btn-save">&#8681; Save</button>
        <button id="btn-load">&#8679; Load</button>
      </div>
      <button id="btn-run">&#9654; Run</button>
    </div>
  </div>

  <div id="canvas-container"></div>

  <!-- Konva from CDN — must load before our modules -->
  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <script type="module" src="src/main.js"></script>

</body>
</html>
